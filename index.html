<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💻 System_Core_Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0e15;
            color: #00ff66; /* 터미널 특유의 형광 초록색 */
            font-family: 'Fira Code', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 터미널 창 프레임 */
        .window {
            background-color: #1a1c23;
            width: 100%;
            max-width: 700px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid #323645;
            overflow: hidden;
        }

        /* 상단 바 (맥북 터미널 감성) */
        .window-header {
            background-color: #252834;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .buttons {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }

        .window-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #6272a4;
            font-size: 0.85rem;
        }

        /* 터미널 내부 화면 */
        .terminal-body {
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* 대시보드 스탯 존 (똑똑해 보이는 실시간 바) */
        .stats-panel {
            border-bottom: 1px dashed #323645;
            padding-bottom: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            color: #50fa7b;
            font-size: 0.85rem;
        }

        .log-line {
            margin-bottom: 5px;
            word-break: break-all;
        }

        .log-time { color: #6272a4; }
        .log-success { color: #50fa7b; }
        .log-warn { color: #ffb86c; }

        /* 입력 공간 */
        .input-line {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .prompt {
            color: #ff79c6;
            font-weight: bold;
        }

        .cmd-input {
            background: none;
            border: none;
            color: #ffffff;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="window-header">
            <div class="buttons">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <div class="window-title">root@quantum_core:~</div>
        </div>

        <div class="terminal-body" id="terminal">
            <div class="stats-panel">
                <span>[CPU: <span id="cpuUsage">24</span>%]</span>
                <span>[MEM: 4.12GB / 16GB]</span>
                <span>[STATUS: ONLINE]</span>
            </div>

            <div id="logOutput">
                <div class="log-line"><span class="log-time">[16:26:01]</span> System initialization sequence started...</div>
                <div class="log-line"><span class="log-time">[16:26:02]</span> <span class="log-success">SUCCESS:</span> Quantum core network linked.</div>
            </div>

            <div class="input-line">
                <span class="prompt">guest@quantum:~$</span>
                <input type="text" class="cmd-input" id="cmdInput" placeholder="여기에 명령어를 입력하세요 (예: help, scan, hack)" autofocus autocomplete="off">
            </div>
        </div>
    </div>

    <script>
        const cmdInput = document.getElementById("cmdInput");
        const logOutput = document.getElementById("logOutput");
        const terminalBody = document.getElementById("terminal");

        // 1. 실시간 CPU 사용량 뻥튀기 주기 (똑똑해 보이는 장치)
        setInterval(() => {
            const mockCpu = Math.floor(Math.random() * 30) + 20; // 20~50% 사이 왔다갔다
            document.getElementById("cpuUsage").innerText = mockCpu;
        }, 1500);

        // 시간 포맷터
        function getLogTime() {
            const now = new Date();
            return `[${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}]`;
        }

        // 명령어 입력 이벤트 수신
        cmdInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                const command = cmdInput.value.trim().toLowerCase();
                if(!command) return;

                // 내가 친 명령어 화면에 뿌리기
                appendLog(`<span class="prompt">guest@quantum:~$</span> ${cmdInput.value}`);
                cmdInput.value = ""; // 인풋 비우기

                // 명령어별 분기 처리 (지적인 척하는 답변 스크립트)
                setTimeout(() => {
                    processCommand(command);
                }, 200);
            }
        });

        function appendLog(htmlContent) {
            const line = document.createElement("div");
            line.className = "log-line";
            line.innerHTML = htmlContent;
            logOutput.appendChild(line);
            
            // 자동 스크롤 하단 고정
            terminalBody.scrollTop = terminalBody.scrollHeight;
        }

        function processCommand(cmd) {
            const time = getLogTime();
            
            if (cmd === 'help') {
                appendLog(`<span class="log-time">${time}</span> 이용 가능한 보안 프로토콜 명령어:`);
                appendLog(` &nbsp;&nbsp;- <span class="log-success">scan</span> : 주변 네트워크 대역폭 취약점 점검`);
                appendLog(` &nbsp;&nbsp;- <span class="log-success">hack</span> : 커스텀 알고리즘 오버클럭 가동`);
                appendLog(` &nbsp;&nbsp;- <span class="log-success">clear</span> : 터미널 버퍼 초기화`);
            } 
            else if (cmd === 'scan') {
                appendLog(`<span class="log-time">${time}</span> <span class="log-warn">WARNING:</span> Scanning neighboring IP blocks...`);
                appendLog(`<span class="log-time">${time}</span> Port 8080 open. Cryptographic protocol matched.`);
                appendLog(`<span class="log-time">${time}</span> <span class="log-success">ANALYSIS:</span> 취약점 발견 없음. 시스템이 완벽하게 안전합니다.`);
            } 
            else if (cmd === 'hack') {
                appendLog(`<span class="log-time">${time}</span> <span class="log-warn">CRITICAL:</span> 양자 매트릭스 우회 연산을 시작합니다.`);
                // 시간차를 두고 촤르륵 뜨는 멋진 효과
                let count = 0;
                const interval = setInterval(() => {
                    appendLog(`<span class="log-time">${getLogTime()}</span> Injecting payload sequence #${Math.floor(Math.random()*9000+1000)}... OK`);
                    count++;
                    if(count > 4) {
                        clearInterval(interval);
                        appendLog(`<span class="log-time">${getLogTime()}</span> <span class="log-success">SUCCESS:</span> 연산 최적화 완료.`);
                    }
                }, 300);
            } 
            else if (cmd === 'clear') {
                logOutput.innerHTML = "";
            } 
            else {
                appendLog(`<span class="log-time">${time}</span> <span class="log-warn">Error:</span> 알 수 없는 명령어 '${cmd}'. 'help'를 입력해 보세요.`);
            }
        }
    </script>
</body>
</html>
