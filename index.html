<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧾 킹받는 영수증 제조기</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=DooHyeon&family=Nanum+Gothic+Coding&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nanum Gothic Coding', monospace;
            background-color: #2c3e50;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #fff;
            margin-bottom: 5px;
            font-family: 'DooHyeon', sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: #bdc3c7;
            margin-bottom: 30px;
        }

        /* 입력 창 컨테이너 */
        .input-container {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: 'Nanum Gothic Coding', monospace;
        }

        input[type="text"] { flex: 2; }
        input[type="number"] { flex: 1; }

        button {
            width: 100%;
            padding: 12px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #d35400; }

        /* 🧾 진짜 영수증 스타일링 */
        .receipt-paper {
            background-color: #fbfbfb;
            width: 100%;
            max-width: 360px;
            padding: 30px 20px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.3);
            font-family: 'Nanum Gothic Coding', monospace;
            position: relative;
            display: none; /* 처음에 숨김 */
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .receipt-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .receipt-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0 0 5px 0;
            letter-spacing: -1px;
        }

        .receipt-info {
            font-size: 0.8rem;
            color: #666;
            line-height: 1.4;
            text-align: left;
        }

        /* 요청하신 점선(dashed) 테두리 디테일 */
        .divider {
            border-top: 1px dashed #333;
            margin: 15px 0;
        }

        /* 서체가 흐릿하게 지워진 듯한 효과 (opacity와 text-shadow 활용) */
        .receipt-body {
            font-size: 0.9rem;
            color: rgba(30, 30, 30, 0.85);
            text-shadow: 0.5px 0.5px 0px rgba(0,0,0,0.2); 
        }

        .item-table {
            width: 100%;
            border-collapse: collapse;
        }

        .item-table th {
            text-align: left;
            font-size: 0.85rem;
            padding-bottom: 5px;
        }
        .item-table th.price-col, .item-table td.price-col {
            text-align: right;
        }

        .item-table td {
            padding: 6px 0;
        }

        .total-section {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .receipt-footer {
            text-align: center;
            font-size: 0.8rem;
            color: #777;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <h1>🧾 정신 승리 영수증 제조기</h1>
    <p class="subtitle">어이없는 지출이나 정신적 피해 보상을 청구해 보세요.</p>

    <div class="input-container">
        <div class="input-row">
            <input type="text" id="itemName" placeholder="내역 (예: 절친의 이불킥 헛소리 직관)">
            <input type="number" id="itemPrice" placeholder="금액 (원)">
        </div>
        <button onclick="generateReceipt()">영수증 청구하기 ➡️</button>
    </div>

    <div class="receipt-paper" id="receipt">
        <div class="receipt-header">
            <h2 class="receipt-title">[손해 배상 청구서]</h2>
            <div class="receipt-info">
                매장명: 내 멘탈 관리소 (인천점)<br>
                대표자: 나자신<br>
                일시: <span id="receiptDate">2026-05-20 16:15</span><br>
                포스번호: #0001-0023
            </div>
        </div>

        <div class="divider"></div>

        <div class="receipt-body">
            <table class="item-table">
                <thead>
                    <tr>
                        <th>품명 및 내역</th>
                        <th class="price-col">금액</th>
                    </tr>
                </thead>
                <tbody id="receiptItems">
                    </tbody>
            </table>
        </div>

        <div class="divider"></div>

        <div class="total-section">
            <span>청구 총액:</span>
            <span id="receiptTotal">0원</span>
        </div>

        <div class="divider"></div>

        <div class="receipt-footer">
            이 영수증은 법적 효력이 전혀 없지만<br>
            당신의 정신 건강에는 이로울 수 있습니다.<br>
            ★ 이용해 주셔서 감사합니다 ★
        </div>
    </div>

    <script>
        // 현재 날짜와 시간 구하는 함수
        function updateDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${date} ${hours}:${minutes}`;
        }

        function generateReceipt() {
            const nameInput = document.getElementById("itemName");
            const priceInput = document.getElementById("itemPrice");
            
            const name = nameInput.value.trim();
            const price = priceInput.value.trim();

            if (!name || !price) {
                alert("내용과 금액을 모두 입력해 주세요!");
                return;
            }

            // 날짜 업데이트
            document.getElementById("receiptDate").innerText = updateDateTime();

            // 품목 렌더링
            const tbody = document.getElementById("receiptItems");
            const formattedPrice = Number(price).toLocaleString();
            
            // 기존 누적 없이 매번 새로 발행하는 컨셉 (누적하고 싶으면 += 로 변경 가능)
            tbody.innerHTML = `
                <tr>
                    <td>${name}</td>
                    <td class="price-col">${formattedPrice}원</td>
                </tr>
            `;

            // 총액 업데이트
            document.getElementById("receiptTotal").innerText = `${formattedPrice}원`;

            // 영수증 스르륵 등장
            document.getElementById("receipt").style.display = "block";

            // 입력창 초기화
            nameInput.value = "";
            priceInput.value = "";
        }
    </script>
</body>
</html>
